{% if skills %}
<table>
  <tr><th>name</th><th>domain</th><th>version</th><th>description</th></tr>
  {% for s in skills %}
  <tr>
    <td>{{ s.name }}</td>
    <td><span class="badge">{{ s.domain }}</span></td>
    <td>{{ s.version }}</td>
    <td style="color: var(--dim)">{{ s.description[:80] }}</td>
  </tr>
  {% endfor %}
</table>
{% else %}
<div class="empty">skill registry is empty — chips register at startup or via /api/v1/skills/plugins</div>
{% endif %}
